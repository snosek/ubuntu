services:
  npm:
    image: jc21/nginx-proxy-manager:2.15.1
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - /home/snosek/stack/system/nginx-proxy-manager/data:/data
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - internal

networks:
  internal:
    external: true
