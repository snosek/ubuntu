services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    ports:
      - 3000:3000
    volumes:
      - /home/snosek/stack/services/homepage/config:/app/config
    environment:
      HOMEPAGE_ALLOWED_HOSTS: gethomepage.dev,192.168.100.128:3000
    networks:
      - internal

networks:
  internal:
    external: true
